# =============================================================================
# Configuration du pipeline dlt AF/KLM (non sensible, versionnable)
# =============================================================================

[runtime]
log_level = "INFO"  # DEBUG, INFO, WARNING, ERROR

[sources.afklm]
# api_key dans secrets.toml — optionnel : start_date, end_date pour la fenêtre
# Limiter à quelques pages seulement (pageSize=100, donc ~500 vols max)

start_date = "2026-01-16T00:00:00Z"
end_date = "2026-01-16T02:00:00Z"

[destination.postgres]
dataset_name = "public"  # Schéma Supabase où dlt crée les tables
